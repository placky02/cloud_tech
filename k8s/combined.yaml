apiVersion: apps/v1
kind: Deployment
metadata: { name: webapp }
spec:
  replicas: 2
  selector: { matchLabels: { app: webapp } }
  template:
    metadata: { labels: { app: webapp } }
    spec:
      containers:
      - name: webapp
        image: webapp:v1
        imagePullPolicy: Never
        ports: [{ containerPort: 5000 }]
---
apiVersion: v1
kind: Service
metadata: { name: webapp }
spec:
  selector: { app: webapp }
  ports: [{ port: 80, targetPort: 5000 }]
  type: NodePort
