name: Full CI/CD

on: [push]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions: 
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./webapp
          push: true
          # Hardcoded lowercase name to bypass the naming error
          tags: ghcr.io/placky02/cloud_tech/webapp:latest

      - name: Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/placky02/cloud_tech/webapp:latest
          severity: 'CRITICAL,HIGH'