name: Full CI/CD

on: [push]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4

      # This step fixes the uppercase error by creating a lowercase variable
      - name: Lowercase repo name
        run: |
          echo "IMAGE_TAG=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}/webapp:latest" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./webapp
          push: true
          # Uses the lowercase variable we just created
          tags: ${{ env.IMAGE_TAG }}

      - name: Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          severity: 'CRITICAL,HIGH'